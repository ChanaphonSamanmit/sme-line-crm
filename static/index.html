<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>สะสมแต้ม</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #06C755;
            --green-dark: #05a847;
            --green-light: #e6f9ee;
            --gold: #F5A623;
            --gold-light: #fff8ed;
            --dark: #111827;
            --text: #1f2937;
            --muted: #9ca3af;
            --border: #f3f4f6;
            --bg: #f0f4f8;
            --card: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Prompt', sans-serif; background: var(--bg); min-height: 100vh; overflow-x: hidden; }

        /* ── Loading ── */
        #loading-screen {
            position: fixed; inset: 0;
            background: linear-gradient(150deg, #06C755 0%, #039e41 100%);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.5s, visibility 0.5s;
        }
        #loading-screen.hide { opacity: 0; visibility: hidden; pointer-events: none; }
        .loading-icon { font-size: 52px; margin-bottom: 14px; animation: float 2s ease-in-out infinite; }
        .loading-text { color: rgba(255,255,255,0.9); font-size: 16px; font-weight: 500; }
        .loading-dots { display: flex; gap: 6px; margin-top: 20px; }
        .loading-dot { width: 8px; height: 8px; background: rgba(255,255,255,0.5); border-radius: 50%; animation: dot-pulse 1.2s ease-in-out infinite; }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot-pulse { 0%,80%,100%{transform:scale(0.8);opacity:0.5} 40%{transform:scale(1.2);opacity:1} }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

        /* ── Header ── */
        .header {
            background: linear-gradient(150deg, #06C755 0%, #039e41 100%);
            padding: 24px 20px 64px;
            position: relative; overflow: hidden;
        }
        .header-circle-1 { position:absolute; top:-40px; right:-40px; width:160px; height:160px; background:rgba(255,255,255,0.07); border-radius:50%; }
        .header-circle-2 { position:absolute; bottom:-60px; left:-20px; width:200px; height:200px; background:rgba(255,255,255,0.05); border-radius:50%; }
        .profile-row { display:flex; align-items:center; gap:14px; position:relative; z-index:1; }
        .avatar { width:54px; height:54px; border-radius:50%; border:2.5px solid rgba(255,255,255,0.5); object-fit:cover; background:rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
        .profile-info { flex:1; color:white; }
        .profile-name { font-size:17px; font-weight:600; letter-spacing:0.01em; }
        .profile-sub { font-size:12px; opacity:0.75; margin-top:3px; }
        .line-tag { display:inline-flex; align-items:center; gap:4px; background:rgba(255,255,255,0.18); border:1px solid rgba(255,255,255,0.3); color:white; font-size:11px; padding:3px 9px; border-radius:99px; margin-top:5px; }

        /* ── Content ── */
        .content { padding: 0 16px 32px; margin-top: -44px; position: relative; z-index: 2; }

        /* ── Status Cards ── */
        .status-card {
            border-radius: 18px; padding: 16px 18px;
            display: flex; align-items: center; gap: 14px;
            margin-bottom: 14px; border: 1.5px solid transparent;
        }
        .status-card.success { background: var(--green-light); border-color: #a7f0c4; }
        .status-card.error   { background: #fff1f0; border-color: #ffc9c5; }
        .status-card.pending { background: #eff6ff; border-color: #bfdbfe; }
        .status-icon { font-size: 32px; flex-shrink: 0; }
        .status-body .status-title { font-size: 15px; font-weight: 600; }
        .status-body .status-title.success { color: #065f46; }
        .status-body .status-title.error   { color: #b91c1c; }
        .status-body .status-title.pending { color: #1e40af; }
        .status-body .status-desc { font-size: 12.5px; color: var(--muted); margin-top: 2px; }

        .scan-prompt {
            background: white; border-radius: 20px;
            padding: 28px 20px; text-align: center;
            margin-bottom: 14px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.07);
        }
        .scan-prompt-icon { font-size: 48px; }
        .scan-prompt-title { font-size: 17px; font-weight: 600; color: var(--text); margin-top: 10px; }
        .scan-prompt-sub { font-size: 13px; color: var(--muted); margin-top: 5px; }

        /* ── Points Card ── */
        .points-card {
            background: white; border-radius: 22px;
            padding: 24px 22px; margin-bottom: 14px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.09);
            position: relative; overflow: hidden;
        }
        .points-card-bg {
            position: absolute; right: -10px; top: -10px;
            font-size: 100px; opacity: 0.05; line-height: 1;
            pointer-events: none; user-select: none;
        }
        .points-label { font-size: 12.5px; color: var(--muted); font-weight: 400; }
        .points-row-main { display: flex; align-items: baseline; gap: 6px; margin: 6px 0 2px; }
        .points-value { font-size: 50px; font-weight: 700; color: var(--gold); line-height: 1; }
        .points-unit { font-size: 15px; font-weight: 500; color: var(--text); }
        .points-divider { height: 1px; background: var(--border); margin: 18px 0; }
        .stats-row { display: flex; }
        .stat-item { flex: 1; text-align: center; }
        .stat-item + .stat-item { border-left: 1px solid var(--border); }
        .stat-val { font-size: 18px; font-weight: 700; color: var(--text); }
        .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 3px; }

        /* ── Tier Card ── */
        .tier-card {
            background: white; border-radius: 18px;
            padding: 18px 20px; margin-bottom: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .tier-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .tier-left-label { font-size: 12px; color: var(--muted); }
        .tier-badge { font-size: 17px; font-weight: 700; margin-top: 2px; }
        .tier-badge.bronze { color: #b45309; }
        .tier-badge.silver { color: #6b7280; }
        .tier-badge.gold   { color: var(--gold); }
        .tier-right { text-align: right; }
        .tier-right .tier-left-label { text-align: right; }
        .tier-next-val { font-size: 13px; color: var(--muted); margin-top: 2px; }
        .tier-bar-track { height: 10px; background: var(--border); border-radius: 99px; overflow: hidden; }
        .tier-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--green), var(--gold)); transition: width 0.9s cubic-bezier(.22,1,.36,1); width: 0; }
        .tier-hint { font-size: 12px; color: var(--muted); margin-top: 8px; }

        /* ── History ── */
        .section-title { font-size: 14px; font-weight: 600; color: var(--text); margin: 20px 0 10px; display: flex; align-items: center; gap: 6px; }
        .history-item {
            background: white; border-radius: 16px;
            padding: 14px 16px; margin-bottom: 8px;
            display: flex; align-items: center; gap: 14px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.05);
        }
        .history-icon { width: 42px; height: 42px; border-radius: 13px; background: var(--green-light); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
        .history-main { flex: 1; min-width: 0; }
        .history-name { font-size: 13.5px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .history-date { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
        .history-right { text-align: right; flex-shrink: 0; }
        .history-amount { font-size: 15px; font-weight: 600; color: var(--text); }
        .history-pts { font-size: 11.5px; color: var(--green); font-weight: 500; margin-top: 2px; }

        .empty-state { text-align: center; padding: 24px; color: var(--muted); font-size: 13.5px; }

        /* ── Animations ── */
        @keyframes slideUp { from { opacity:0; transform:translateY(16px) } to { opacity:1; transform:translateY(0) } }
        .anim { opacity: 0; animation: slideUp 0.4s ease forwards; }
        .d1 { animation-delay: 0.05s; }
        .d2 { animation-delay: 0.12s; }
        .d3 { animation-delay: 0.20s; }
        .d4 { animation-delay: 0.28s; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="loading-icon">🏪</div>
    <div class="loading-text">กำลังโหลดข้อมูล</div>
    <div class="loading-dots">
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
    </div>
</div>

<div id="app" style="display:none">
    <div class="header">
        <div class="header-circle-1"></div>
        <div class="header-circle-2"></div>
        <div class="profile-row">
            <div class="avatar" id="avatar">👤</div>
            <div class="profile-info">
                <div class="profile-name" id="display-name">กำลังโหลด...</div>
                <div class="profile-sub" id="member-since">สมาชิก LINE</div>
                <div class="line-tag">🟢 LINE Connected</div>
            </div>
        </div>
    </div>

    <div class="content">
        <div id="status-area" class="anim d1"></div>

        <div class="points-card anim d2" id="points-card" style="display:none">
            <div class="points-card-bg">⭐</div>
            <div class="points-label">คะแนนสะสมของคุณ</div>
            <div class="points-row-main">
                <div class="points-value" id="points-display">0</div>
                <div class="points-unit">แต้ม</div>
            </div>
            <div class="points-divider"></div>
            <div class="stats-row">
                <div class="stat-item">
                    <div class="stat-val" id="stat-txcount">0</div>
                    <div class="stat-lbl">ครั้งที่ซื้อ</div>
                </div>
                <div class="stat-item">
                    <div class="stat-val" id="stat-spent">฿0</div>
                    <div class="stat-lbl">ยอดรวม</div>
                </div>
                <div class="stat-item">
                    <div class="stat-val" id="stat-avg">฿0</div>
                    <div class="stat-lbl">เฉลี่ย/ครั้ง</div>
                </div>
            </div>
        </div>

        <div class="tier-card anim d3" id="tier-card" style="display:none">
            <div class="tier-header">
                <div>
                    <div class="tier-left-label">ระดับปัจจุบัน</div>
                    <div class="tier-badge" id="tier-name">🥉 Bronze</div>
                </div>
                <div class="tier-right">
                    <div class="tier-left-label">ระดับถัดไป</div>
                    <div class="tier-next-val" id="tier-next">Silver</div>
                </div>
            </div>
            <div class="tier-bar-track">
                <div class="tier-bar-fill" id="tier-bar"></div>
            </div>
            <div class="tier-hint" id="tier-hint"></div>
        </div>

        <div id="history-area" style="display:none">
            <div class="section-title anim d3">📋 ประวัติการสะสม</div>
            <div id="history-list" class="anim d4"></div>
        </div>
    </div>
</div>

<script>
    // ── Config ──
    const LIFF_ID     = "2009142385-rGVgyn7a";
    const MERCHANT_ID = "4980c176-a1ec-4771-a9fa-ce87320435c9";
    const PTS_PER_BAHT = 100; // ทุก ฿100 = 1 แต้ม

    // ── Tier definitions ──
    const TIERS = [
        { name: '🥉 Bronze', cls: 'bronze', min: 0,    max: 300,  next: 'Silver'  },
        { name: '🥈 Silver', cls: 'silver', min: 300,  max: 1000, next: 'Gold'    },
        { name: '🥇 Gold',   cls: 'gold',   min: 1000, max: 2000, next: 'Platinum'},
        { name: '💎 Platinum', cls: 'gold', min: 2000, max: 2000, next: '—'       },
    ];

    function getTier(pts) {
        const t = [...TIERS].reverse().find(t => pts >= t.min) || TIERS[0];
        const progress = t.max > t.min ? Math.min((pts - t.min) / (t.max - t.min) * 100, 100) : 100;
        const remaining = Math.max(0, t.max - pts);
        const hint = remaining > 0 ? `อีก ${remaining} แต้ม ถึง ${t.next}` : `ถึงระดับสูงสุดแล้ว 🎉`;
        return { ...t, progress, hint };
    }

    function calcPoints(baht) {
        return Math.floor(baht / PTS_PER_BAHT);
    }

    // ── UI Helpers ──
    function showStatus(type, icon, title, desc) {
        document.getElementById('status-area').innerHTML = `
            <div class="status-card ${type}">
                <div class="status-icon">${icon}</div>
                <div class="status-body">
                    <div class="status-title ${type}">${title}</div>
                    <div class="status-desc">${desc}</div>
                </div>
            </div>`;
    }

    function showScanPrompt() {
        document.getElementById('status-area').innerHTML = `
            <div class="scan-prompt">
                <div class="scan-prompt-icon">📱</div>
                <div class="scan-prompt-title">สแกน QR เพื่อสะสมแต้ม</div>
                <div class="scan-prompt-sub">ขอ QR Code จากพนักงานหลังจ่ายเงิน</div>
            </div>`;
    }

    function hideLoading() {
        document.getElementById('loading-screen').classList.add('hide');
        document.getElementById('app').style.display = 'block';
    }

    // ── Claim QR ──
    async function handleClaim(qrId, userId, profile) {
        showStatus('pending', '⏳', 'กำลังบันทึกแต้ม...', 'รอสักครู่');
        try {
            const res = await fetch('/api/v1/qr/claim', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    line_user_id: userId,
                    display_name: profile.displayName,
                    picture_url: profile.pictureUrl || '',
                    qr_id: qrId
                })
            });
            const result = await res.json();

            if (result.status === 'success') {
                const pts = calcPoints(result.amount);
                showStatus('success', '✅', `ได้รับ +${pts} แต้ม!`,
                    `ยอดซื้อ ฿${Number(result.amount).toLocaleString()} — ${result.message || ''}`);
            } else {
                showStatus('error', '❌', 'ไม่สำเร็จ', result.message || 'ลองใหม่อีกครั้ง');
            }
        } catch (e) {
            showStatus('error', '⚠️', 'เกิดข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อได้ กรุณาลองใหม่');
        }
    }

    // ── Member Data ──
    async function loadMemberData(userId) {
        try {
            const res = await fetch(`/api/v1/analytics/member-summary/${userId}?merchant_id=${MERCHANT_ID}`);
            if (!res.ok) throw new Error('API error');
            const data = await res.json();

            const totalSpent = data.total_spent || 0;
            const txCount    = data.tx_count || 0;
            const points     = calcPoints(totalSpent);
            const avgSpent   = txCount ? Math.round(totalSpent / txCount) : 0;

            // Points card
            document.getElementById('points-display').textContent = points.toLocaleString();
            document.getElementById('stat-txcount').textContent   = txCount.toLocaleString();
            document.getElementById('stat-spent').textContent     = `฿${totalSpent.toLocaleString()}`;
            document.getElementById('stat-avg').textContent       = `฿${avgSpent.toLocaleString()}`;
            document.getElementById('points-card').style.display  = '';

            // Tier
            const tier = getTier(points);
            const tierEl = document.getElementById('tier-name');
            tierEl.textContent = tier.name;
            tierEl.className   = `tier-badge ${tier.cls}`;
            document.getElementById('tier-next').textContent = tier.next;
            document.getElementById('tier-hint').textContent = tier.hint;
            document.getElementById('tier-card').style.display = '';
            setTimeout(() => {
                document.getElementById('tier-bar').style.width = tier.progress + '%';
            }, 350);

            // Member since
            if (data.first_purchase) {
                const d = new Date(data.first_purchase);
                document.getElementById('member-since').textContent =
                    `สมาชิกตั้งแต่ ${d.toLocaleDateString('th-TH', { year: 'numeric', month: 'long' })}`;
            }

            // History
            const txs = data.recent_transactions;
            if (txs?.length) {
                document.getElementById('history-area').style.display = '';
                document.getElementById('history-list').innerHTML = txs.slice(0, 5).map(tx => {
                    const d    = new Date(tx.created_at);
                    const time = d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
                    const pts  = calcPoints(tx.amount);
                    const items = 'รายการซื้อ';
                    
                    return `
                        <div class="history-item">
                            <div class="history-icon">🧾</div>
                            <div class="history-main">
                                <div class="history-name">${items}</div>
                                <div class="history-date">${time}</div>
                            </div>
                            <div class="history-right">
                                <div class="history-amount">฿${Number(tx.amount).toLocaleString()}</div>
                                <div class="history-pts">+${pts} แต้ม</div>
                            </div>
                        </div>`;
                }).join('');
            }

        } catch (e) {
            // แสดง card เปล่าเพื่อไม่ให้ UX พัง
            document.getElementById('points-card').style.display = '';
            document.getElementById('tier-card').style.display = '';
            console.warn('Member data unavailable:', e.message);
        }
    }

    // ── Main ──
    async function main() {
        try {
            await liff.init({ liffId: LIFF_ID });

            if (!liff.isLoggedIn()) {
                liff.login({ redirectUri: window.location.href });
                return;
            }

            const profile = await liff.getProfile();
            const userId  = profile.userId;

            // Profile UI
            document.getElementById('display-name').textContent = profile.displayName;
            if (profile.pictureUrl) {
                document.getElementById('avatar').innerHTML =
                    `<img src="${profile.pictureUrl}" style="width:54px;height:54px;border-radius:50%;object-fit:cover">`;
            }

            // QR Claim หรือแสดง scan prompt
            const qrId = new URLSearchParams(window.location.search).get('qr_id');
            if (qrId) {
                await handleClaim(qrId, userId, profile);
            } else {
                showScanPrompt();
            }

            // โหลดข้อมูลสมาชิก (ทำพร้อมกัน)
            await loadMemberData(userId);

        } catch (e) {
            showStatus('error', '⚠️', 'เปิดไม่ได้', 'กรุณาเปิดผ่าน LINE เท่านั้น');
            console.error(e);
        } finally {
            hideLoading();
        }
    }

    main();
</script>
</body>
</html>
